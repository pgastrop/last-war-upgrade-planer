<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://pocwtsbryvxwzdoitxtb.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Last War – Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<style>
:root {--accent:#f0a500;--green:#2ea043;--red:#cf222e;--blue:#0969da;--purple:#8250df}
[data-theme="dark"]  {--bg:#0b0f14;--card:#13191f;--card2:#1a2230;--border:#2a3548;--text:#e6edf3;--muted:#7d8fa8;--hover:#1c2a3a}
[data-theme="light"] {--bg:#f0f4f8;--card:#fff;   --card2:#eef2f7;--border:#c8d6e5;--text:#1a2535;--muted:#6b7c93;--hover:#e8f0fb}
*, *::before, *::after {box-sizing:border-box; margin:0; padding:0}
body  {background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh}
nav   {
  background:var(--card); border-bottom:2px solid var(--accent);
  display:flex; align-items:center; justify-content:space-between;
  padding:.55rem 1.1rem; position:sticky; top:0; z-index:100; gap:.5rem;
}
.nav-title       {font-size:.95rem; font-weight:700; color:var(--accent)}
.nav-title small {display:block; font-size:.62rem; color:var(--muted); font-weight:400}
.btn-nav {
  padding:.28rem .65rem; border-radius:7px; border:1px solid var(--border);
  background:var(--card2); color:var(--text); font-size:.73rem;
  cursor:pointer; white-space:nowrap; transition:border-color .15s, color .15s;
}
.btn-nav:hover       {border-color:var(--accent); color:var(--accent)}
.btn-nav.danger      {color:#f87171; border-color:#f87171}
.btn-nav.danger:hover{background:#3a1a1a}
main {max-width:1200px; margin:0 auto; padding:1.2rem}
.stats {display:flex; gap:.8rem; flex-wrap:wrap; margin-bottom:1.2rem}
.stat {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:.7rem 1.1rem; text-align:center; flex:1; min-width:100px;
}
.stat strong {display:block; font-size:1.6rem; color:var(--accent)}
.stat span   {font-size:.68rem; color:var(--muted)}
.card        {background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:.8rem}
.card-title  {font-size:.74rem; text-transform:uppercase; letter-spacing:.7px; color:var(--accent); margin-bottom:.8rem; font-weight:700}
.tbl-wrap    {overflow:auto; border-radius:8px; border:1px solid var(--border); max-height:450px}
table        {width:100%; border-collapse:collapse; font-size:.8rem}
th {padding:.42rem .55rem; text-align:left; color:var(--muted); font-weight:700; border-bottom:1px solid var(--border); background:var(--card); position:sticky; top:0}
td {padding:.38rem .52rem; border-bottom:1px solid var(--border); vertical-align:middle}
tr:hover td  {background:var(--hover)}
.tag         {display:inline-block; padding:.05rem .38rem; border-radius:99px; font-size:.66rem; font-weight:700}
.tag-admin   {background:#2d1040; color:#ce93d8}
.tag-user    {background:#0d1e3a; color:#60a5fa}
.btn-sm      {border:none; border-radius:5px; padding:.18rem .45rem; font-size:.7rem; cursor:pointer; color:#fff}
.btn-promote {background:var(--purple)}
.btn-demote  {background:var(--card2); color:var(--muted); border:1px solid var(--border)}
.btn-view    {background:var(--blue)}
.overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:300; align-items:center; justify-content:center;
}
.overlay.show {display:flex}
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:1.3rem; width:min(600px,95vw); max-height:88vh; overflow-y:auto;
}
.modal h3    {color:var(--accent); margin-bottom:1rem; font-size:.95rem; font-weight:800}
.chip        {display:inline-block; background:var(--card2); border-radius:4px; padding:.03rem .28rem; font-size:.7rem; margin:.1rem .08rem}
.loading     {text-align:center; padding:2rem; color:var(--muted)}
.error-msg   {text-align:center; padding:2rem; color:#f87171}
</style>
</head>
<body>
<nav>
  <div>
    <div class="nav-title">👑 Admin-Dashboard – Last War Upgrade-Planer
      <small>Nur für Administratoren</small>
    </div>
  </div>
  <div style="display:flex;gap:.4rem;flex-wrap:wrap">
    <button class="btn-nav" onclick="location.href='app.html'">⬅️ Zur App</button>
    <button class="btn-nav" onclick="loadAll()">🔄 Aktualisieren</button>
    <button class="btn-nav danger" onclick="Auth.logout()">🚪 Logout</button>
  </div>
</nav>

<main>
  <div id="status" class="loading">⏳ Lade Daten…</div>
  <div id="content" hidden>
    <div class="stats" id="statsRow"></div>

    <div class="card">
      <div class="card-title">👥 Registrierte Nutzer</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Nutzer</th><th>Rolle</th><th>Registriert</th>
            <th>Letzter AutoSave</th><th>Stände</th><th>Aktionen</th>
          </tr></thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💾 Alle Spielstände</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Nutzer</th><th>Name</th><th>Stil</th><th>Ressourcen</th><th>Gespeichert</th><th>Aktionen</th>
          </tr></thead>
          <tbody id="statesBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <button onclick="closeDetail()" style="float:right;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer">✕</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>

// ── XSS-Schutz Escape-Helfer ──────────────────────────────────
function escTxt(s)  { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return String(s ?? '').replace(/['"&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
// ── Konstanten ────────────────────────────────────────────────
// FIX: Credentials via js/config.js + js/auth.js (_sb)
// FIX: Credentials via js/config.js + js/auth.js (_sb)
const RES_ICONS = {food:'🌾', iron:'⚙️', gold:'💰', oil:'🔩', stone:'🪨', quartz:'💎'};

// ── Auth ──────────────────────────────────────────────────────
const Auth = {
  async getSession() {
    const { data, error } = await _sb.auth.getSession();
    return error ? null : (data?.session ?? null);
  },
  async getProfile(userId) {
    const { data } = await _sb.from('profiles').select('*').eq('id', userId).single();
    return data ?? null;
  },
  async logout() {
    await _sb.auth.signOut().catch(() => {});
    localStorage.clear();
    location.replace('index.html');
  }
};

// ── DB ────────────────────────────────────────────────────────
const DB = {
  async loadAll() {
    const [p, s, g] = await Promise.all([
      _sb.from('profiles').select('*').order('created_at'),
      _sb.from('autosave').select('*'),
      _sb.from('game_states').select('*').order('updated_at', { ascending: false })
    ]);
    return {
      profiles: p.data ?? [],
      saves:    s.data ?? [],
      states:   g.data ?? []
    };
  },
  async setRole(userId, role) {
    const { error } = await _sb.from('profiles').update({ role }).eq('id', userId);
    if (error) throw error;
  }
};

// ── State ─────────────────────────────────────────────────────
let data = null;
let me   = null;

// ── UI Helpers ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = d => d ? new Date(d).toLocaleString('de-DE') : '–';
const fmtDate = d => d ? new Date(d).toLocaleDateString('de-DE') : '–';

function setStatus(html, error = false) {
  $('status').textContent = html;
  $('status').className = error ? 'error-msg' : 'loading';
  $('status').hidden = false;
  $('content').hidden = true;
}
function showContent() {
  $('status').hidden = true;
  $('content').hidden = false;
}

// ── Render ────────────────────────────────────────────────────
function renderStats() {
  const admins = data.profiles.filter(p => p.role === 'admin').length;
  $('statsRow').innerHTML = [
    [data.profiles.length, 'Nutzer'],
    [admins,               'Admins'],
    [data.states.length,   'Spielstände'],
    [data.saves.length,    'AutoSaves']
  ].map(([n, l]) => `<div class="stat"><strong>${n}</strong><span>${l}</span></div>`).join('');
}

function renderUsers() {
  $('usersBody').innerHTML = data.profiles.map(p => {
    const save    = data.saves.find(s => s.user_id === p.id);
    const count   = data.states.filter(s => s.user_id === p.id).length;
    const isMe    = p.id === me?.id;
    const isAdmin = p.role === 'admin';
    return `<tr>
      <td><strong>${escTxt(p.username)}</strong>${isMe ? ' <small style="color:var(--green)">(Du)</small>' : ''}</td>
      <td><span class="tag ${isAdmin ? 'tag-admin' : 'tag-user'}">${isAdmin ? '👑 Admin' : '👤 User'}</span></td>
      <td style="color:var(--muted)">${fmtDate(p.created_at)}</td>
      <td style="font-size:.75rem">${save ? fmt(save.updated_at) : '–'}</td>
      <td style="color:var(--accent);font-weight:700">${count}</td>
      <td>
        <div style="display:flex;gap:.3rem;flex-wrap:wrap">
          ${!isMe ? (isAdmin
            ? `<button class="btn-sm btn-demote" onclick="setRole('${p.id}','user')">↓ User</button>`
            : `<button class="btn-sm btn-promote" onclick="setRole('${p.id}','admin')">↑ Admin</button>`)
          : ''}
          ${save ? `<button class="btn-sm btn-view" onclick="showAutoSave('${escAttr(p.id)}','${escAttr(p.username)}')">👁 AutoSave</button>` : ''}
          ${!isMe ? `<button class="btn-sm" style="background:var(--green)" onclick="impersonate('${p.id}','${p.username.replace(/'/g,"\\'")}')">🔍 Als Nutzer öffnen</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

// Admin öffnet app.html im Kontext eines anderen Nutzers
function impersonate(userId, username) {
  if (!confirm(`Den Planer von „${username}" im Lese-/Bearbeitungsmodus öffnen?\n\nDu kannst Daten ansehen und optimieren – deine eigenen Daten bleiben unberührt.`)) return;
  // Impersonation-Token in sessionStorage (nur für diesen Tab, kein localStorage)
  sessionStorage.setItem('lwAdminView', JSON.stringify({
    userId,
    username,
    adminId: me.id,
    adminName: me.username
  }));
  window.open('app.html', '_blank');
}

function renderStates() {
  $('statesBody').innerHTML = data.states.map((s, i) => {
    const user = data.profiles.find(p => p.id === s.user_id);
    const res  = Object.entries(s.resources ?? {})
      .filter(([, v]) => parseFloat(v) > 0)
      .map(([k, v]) => `<span class="chip">${RES_ICONS[k] ?? k} ${v}M</span>`).join('');
    return `<tr>
      <td><strong>${escTxt(user?.username ?? '?')}</strong></td>
      <td>${s.name}</td>
      <td style="font-size:.75rem">${s.style ?? '–'}</td>
      <td style="white-space:normal">${res || '–'}</td>
      <td style="color:var(--muted);font-size:.75rem">${fmt(s.updated_at)}</td>
      <td><button class="btn-sm btn-view" onclick="showState(${i})">👁 Details</button></td>
    </tr>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────────
async function setRole(userId, role) {
  if (!confirm(`Rolle auf "${role}" setzen?`)) return;
  try {
    await DB.setRole(userId, role);
    await loadAll();
  } catch (e) { alert('Fehler: ' + e.message); }
}

function showAutoSave(userId, username) {
  const save = data.saves.find(s => s.user_id === userId);
  if (save) showDetail('AutoSave: ' + username, save);
}

function showState(i) {
  const s = data.states[i];
  const u = data.profiles.find(p => p.id === s.user_id);
  showDetail((u?.username ?? '?') + ' – ' + s.name, s);
}

function showDetail(title, d) {
  const res = d.resources ?? {};
  const cur = d.cur_levels ?? {};
  const resHtml = Object.entries(res)
    .filter(([, v]) => parseFloat(v) > 0)
    .map(([k, v]) => `<span class="chip" style="font-size:.8rem">${RES_ICONS[k] ?? k} <strong>${v}M</strong></span>`).join(' ');
  const curEntries = Object.entries(cur).filter(([, v]) => parseInt(v) > 0);
  const curHtml = curEntries.map(([k, v]) =>
    `<div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:.25rem 0;font-size:.8rem">
      <span>${k}</span><strong>Lv.${v}</strong>
    </div>`).join('');
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = `
    <p style="font-size:.74rem;text-transform:uppercase;color:var(--accent);margin:.6rem 0 .3rem">Rohstoffe</p>
    <div>${resHtml || '–'}</div>
    <p style="font-size:.74rem;text-transform:uppercase;color:var(--accent);margin:.8rem 0 .3rem">Gebäudelevel (${curEntries.length})</p>
    <div style="max-height:300px;overflow-y:auto">${curHtml || '–'}</div>`;
  $('overlay').classList.add('show');
}
function closeDetail() { $('overlay').classList.remove('show'); }

// ── Load ──────────────────────────────────────────────────────
async function loadAll() {
  setStatus('⏳ Lade Daten…');
  try {
    data = await DB.loadAll();
    renderStats(); renderUsers(); renderStates();
    showContent();
  } catch (e) {
    setStatus('❌ Fehler: ' + e.message, true);
  }
}

// ── Init ──────────────────────────────────────────────────────
(async () => {
  const theme = localStorage.getItem('lwTheme') ?? 'dark';
  document.documentElement.dataset.theme = theme;

  const session = await Auth.getSession();
  if (!session) { location.replace('index.html'); return; }

  me = await Auth.getProfile(session.user.id);
  if (!me || me.role !== 'admin') {
    alert('Kein Admin-Zugang.');
    location.replace('app.html');
    return;
  }
  await loadAll();
})();
</script>
</body>
</html>
