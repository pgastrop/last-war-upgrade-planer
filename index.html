<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<!-- FIX: Content-Security-Policy gegen XSS -->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self' https://cdn.jsdelivr.net https://pocwtsbryvxwzdoitxtb.supabase.co;
           script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
           style-src 'self' 'unsafe-inline';">
<title>Last War – Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --accent:#f0a500; --green:#2ea043; --red:#cf222e;
}
[data-theme="dark"]  {--bg:#0b0f14;--card:#13191f;--border:#2a3548;--text:#e6edf3;--muted:#7d8fa8;--inp:#0d1520}
[data-theme="light"] {--bg:#f0f4f8;--card:#fff;   --border:#c8d6e5;--text:#1a2535;--muted:#6b7c93;--inp:#f8fafc}
*, *::before, *::after {box-sizing:border-box; margin:0; padding:0}
body {
  background:var(--bg); color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh; display:flex; align-items:center;
  justify-content:center; padding:1rem;
}
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:2rem; width:min(400px,100%);
}
.logo  {text-align:center; font-size:2.5rem; margin-bottom:.3rem}
h1     {text-align:center; color:var(--accent); font-size:1.2rem; margin-bottom:.2rem}
.sub   {text-align:center; color:var(--muted); font-size:.78rem; margin-bottom:1.5rem}
.tabs  {
  display:flex; border-radius:8px; overflow:hidden;
  border:1px solid var(--border); margin-bottom:1.3rem;
}
.tab {
  flex:1; padding:.5rem; background:transparent; border:none;
  color:var(--muted); font-size:.82rem; font-weight:600;
  cursor:pointer; transition:background .15s, color .15s;
}
.tab.active {background:var(--accent); color:#000}
.field {margin-bottom:.8rem}
label  {display:block; font-size:.76rem; color:var(--muted); margin-bottom:.3rem}
input  {
  width:100%; background:var(--inp); border:1px solid var(--border);
  border-radius:8px; padding:.52rem .72rem; color:var(--text);
  font-size:.88rem; outline:none; transition:border-color .15s;
}
input:focus {border-color:var(--accent)}
.btn {
  width:100%; padding:.62rem; background:var(--accent); color:#000;
  font-weight:800; font-size:.95rem; border:none; border-radius:9px;
  cursor:pointer; margin-top:.4rem; transition:opacity .15s;
}
.btn:hover   {opacity:.85}
.btn:disabled{opacity:.4; cursor:not-allowed}
.msg {
  text-align:center; font-size:.78rem; margin-top:.8rem;
  padding:.5rem; border-radius:7px; display:none;
}
.msg.ok  {background:#0d2a18; color:#4ade80; display:block}
.msg.err {background:#3a1a1a; color:#f87171; display:block}
.hint {font-size:.7rem; color:var(--muted); text-align:center; margin-top:1rem}
.theme-btn {
  position:fixed; top:.8rem; right:.8rem;
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:.3rem .6rem; cursor:pointer; font-size:.9rem;
}
/* FIX: Passwort-Stärke-Indikator */
.pw-strength {
  height:3px; border-radius:99px; margin-top:.3rem; transition:all .3s;
  background:transparent;
}
.pw-strength.weak   {background:var(--red);   width:33%}
.pw-strength.medium {background:var(--accent); width:66%}
.pw-strength.strong {background:var(--green);  width:100%}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()" aria-label="Theme wechseln">🌙</button>

<div class="card">
  <div class="logo" role="img" aria-label="Logo">🌑</div>
  <h1>Last War – Upgrade-Planer</h1>
  <p class="sub">Season 4 · Bitte anmelden</p>

  <div class="tabs" role="tablist">
    <button class="tab active" id="tabLogin" role="tab"
      aria-controls="formLogin" aria-selected="true"
      onclick="showTab('login')">🔑 Login</button>
    <button class="tab" id="tabReg" role="tab"
      aria-controls="formReg" aria-selected="false"
      onclick="showTab('reg')">📝 Registrieren</button>
  </div>

  <!-- LOGIN -->
  <div id="formLogin" role="tabpanel">
    <div class="field">
      <label for="lEmail">E-Mail</label>
      <input type="email" id="lEmail" placeholder="deine@email.de"
        autocomplete="email" maxlength="254"/>
    </div>
    <div class="field">
      <label for="lPass">Passwort</label>
      <input type="password" id="lPass" placeholder="••••••••"
        autocomplete="current-password" maxlength="128"
        onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn" id="btnLogin" onclick="doLogin()">🔑 Anmelden</button>
  </div>

  <!-- REGISTRIEREN -->
  <div id="formReg" role="tabpanel" hidden>
    <div class="field">
      <label for="rName">Benutzername</label>
      <!-- FIX: maxlength gesetzt; autocomplete korrekt -->
      <input type="text" id="rName" placeholder="Dein Spielname"
        autocomplete="username" maxlength="50"/>
    </div>
    <div class="field">
      <label for="rEmail">E-Mail</label>
      <input type="email" id="rEmail" placeholder="deine@email.de"
        autocomplete="email" maxlength="254"/>
    </div>
    <div class="field">
      <label for="rPass">Passwort</label>
      <input type="password" id="rPass" placeholder="mind. 8 Zeichen"
        autocomplete="new-password" maxlength="128"
        oninput="checkPwStrength(this.value)"/>
      <!-- FIX: Passwort-Stärke-Anzeige -->
      <div class="pw-strength" id="pwStrength"></div>
    </div>
    <div class="field">
      <label for="rPass2">Passwort wiederholen</label>
      <input type="password" id="rPass2" placeholder="••••••••"
        autocomplete="new-password" maxlength="128"
        onkeydown="if(event.key==='Enter') doRegister()"/>
    </div>
    <button class="btn" id="btnReg" onclick="doRegister()">📝 Konto erstellen</button>
  </div>

  <div class="msg" id="msg" role="alert" aria-live="polite"></div>
  <p class="hint">Deine Daten werden sicher in Supabase gespeichert.</p>
</div>

<script>
// ── Konstanten ────────────────────────────────────────────────
const SUPABASE_URL  = 'https://pocwtsbryvxwzdoitxtb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvY3d0c2JyeXZ4d3pkb2l0eHRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjI2MjAsImV4cCI6MjA4OTMzODYyMH0.DNgPGFaQkDFTQf7BhtYsysyAvX5VpSBn4WdVmRa4LaU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Auth API ──────────────────────────────────────────────────
const Auth = {
  async getSession() {
    try {
      const { data, error } = await sb.auth.getSession();
      return error ? null : (data?.session ?? null);
    } catch { return null; }
  },
  async login(email, password) {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  },
  async register(email, password, username) {
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    });
    if (error) throw error;
    return data;
  }
};

// ── UI Helpers ────────────────────────────────────────────────
const $ = id => document.getElementById(id);

// FIX: textContent statt innerHTML – kein XSS-Risiko
function showMsg(text, ok = false) {
  const el = $('msg');
  el.textContent = text;
  el.className = text ? `msg ${ok ? 'ok' : 'err'}` : 'msg';
}

function setLoading(btnId, loading, label) {
  const btn = $(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ Bitte warten…' : label;
}

function showTab(tab) {
  $('formLogin').hidden = tab !== 'login';
  $('formReg').hidden   = tab !== 'reg';
  $('tabLogin').classList.toggle('active', tab === 'login');
  $('tabReg').classList.toggle('active',   tab === 'reg');
  // FIX: aria-selected korrekt setzen
  $('tabLogin').setAttribute('aria-selected', tab === 'login');
  $('tabReg').setAttribute('aria-selected',   tab === 'reg');
  showMsg('');
}

function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  document.querySelector('.theme-btn').textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('lwTheme', next);
}

// FIX: Passwort-Stärke berechnen
function checkPwStrength(pw) {
  const el = $('pwStrength');
  if (!pw) { el.className = 'pw-strength'; return; }
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
  el.className = 'pw-strength ' + ['weak','medium','strong'][Math.min(score, 2)];
}

// FIX: E-Mail-Format-Validierung
function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// FIX: Einfaches HTML-Escaping um XSS in Fehlermeldungen zu verhindern
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Actions ───────────────────────────────────────────────────
async function doLogin() {
  const email = $('lEmail').value.trim();
  const pass  = $('lPass').value;
  if (!email || !pass) { showMsg('Bitte E-Mail und Passwort eingeben.'); return; }
  // FIX: E-Mail-Format prüfen
  if (!isValidEmail(email)) { showMsg('Bitte eine gültige E-Mail-Adresse eingeben.'); return; }
  setLoading('btnLogin', true, '🔑 Anmelden');
  try {
    await Auth.login(email, pass);
    showMsg('✅ Angemeldet! Weiterleitung…', true);
    setTimeout(() => window.location.replace('app.html'), 600);
  } catch (e) {
    // FIX: Fehlermeldung escaped (kein innerHTML-Risiko da textContent verwendet)
    showMsg('❌ ' + escapeHtml(e.message));
    setLoading('btnLogin', false, '🔑 Anmelden');
  }
}

async function doRegister() {
  const name  = $('rName').value.trim();
  const email = $('rEmail').value.trim();
  const pass  = $('rPass').value;
  const pass2 = $('rPass2').value;
  if (!name || !email || !pass)  { showMsg('Alle Felder ausfüllen.'); return; }
  if (!isValidEmail(email))      { showMsg('Bitte eine gültige E-Mail-Adresse eingeben.'); return; }
  if (pass !== pass2)            { showMsg('Passwörter stimmen nicht überein.'); return; }
  // FIX: Mindestlänge auf 8 Zeichen erhöht (sicherer)
  if (pass.length < 8)           { showMsg('Passwort mind. 8 Zeichen.'); return; }
  // FIX: Benutzername-Validierung (keine Sonderzeichen die XSS ermöglichen)
  if (!/^[\w\s\-äöüÄÖÜß]{2,50}$/.test(name)) {
    showMsg('Benutzername: 2–50 Zeichen, keine Sonderzeichen.'); return;
  }
  setLoading('btnReg', true, '📝 Konto erstellen');
  try {
    await Auth.register(email, pass, name);
    showMsg('✅ Konto erstellt! Bitte E-Mail bestätigen, dann einloggen.', true);
    setTimeout(() => showTab('login'), 2500);
  } catch (e) {
    showMsg('❌ ' + escapeHtml(e.message));
  } finally {
    setLoading('btnReg', false, '📝 Konto erstellen');
  }
}

// ── Init ──────────────────────────────────────────────────────
(async () => {
  // Theme
  const theme = localStorage.getItem('lwTheme') ?? 'dark';
  document.documentElement.dataset.theme = theme;
  document.querySelector('.theme-btn').textContent = theme === 'dark' ? '🌙' : '☀️';
  // Bereits eingeloggt? → direkt weiter
  const session = await Auth.getSession();
  if (session) window.location.replace('app.html');
})();
</script>
</body>
</html>
